name: Continuous Deployment Maven Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-deliver-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build and test project
        run: mvn -B clean test package --file pom.xml

      - name: Continuous Delivery - save build artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-package
          path: target/*.jar

      - name: Continuous Deployment - deploy to GitHub Packages
        run: mvn -B deploy -DskipTests --file pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
